<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect trick
      var base = '/sivashanmugavadivel-portfolio';
      var path = window.location.pathname.replace(base, '') || '/';
      var redirect = path + window.location.search + window.location.hash;
      console.log('[404.html] caught path:', redirect, '— redirecting to', base + '/');
      sessionStorage.setItem('spa_redirect', redirect);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
