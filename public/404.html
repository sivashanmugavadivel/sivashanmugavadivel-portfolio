<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect trick — custom domain, base is /
      var path = window.location.pathname || '/';
      sessionStorage.setItem('spa_redirect', path + window.location.search + window.location.hash);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
