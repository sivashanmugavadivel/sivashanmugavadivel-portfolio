name: Deploy to GitHub Pages

on:
  push:
    branches: [main, coming-soon]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── coming-soon branch: serve plain HTML, no build needed ──
      - name: Prepare coming-soon page
        if: github.ref == 'refs/heads/coming-soon'
        run: |
          mkdir -p dist
          cp coming-soon.html dist/index.html
          cp -r public/. dist/

      # ── main branch: full Vite build ──
      - uses: pnpm/action-setup@v3
        if: github.ref == 'refs/heads/main'
        with:
          version: 9
      - uses: actions/setup-node@v4
        if: github.ref == 'refs/heads/main'
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
        if: github.ref == 'refs/heads/main'
      - run: pnpm build
        if: github.ref == 'refs/heads/main'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
